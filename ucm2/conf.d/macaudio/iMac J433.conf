Syntax 6

SectionUseCase."HiFi" {
	# Well, sure, the iMac isn't a laptop, but it needs essentially
	# the same config.
	Comment "Default"
	Define.JackCodec "cs42l84"
	Define.PlaybackChannels "6"
	Define.JackDevice "0"
	Define.SpeakerDevice "1"
	Define.SpeakerElem "Left Woofer 1 Speaker Playback Volume"
	File "/conf.d/macaudio/laptops/HiFi.conf"
}
